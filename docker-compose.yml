services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* se ugrađuju u JS bundle tokom build-a,
        # pa moraju biti proslijeđeni kao build argumenti (ne samo runtime).
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
    expose:
      - "3000"
    # Dokploy preko Traefik-a sam usmjerava domenu na port 3000 ovog servisa.
    # Za lokalni test otkomentariši mapiranje porta ispod:
    # ports:
    #   - "3000:3000"
